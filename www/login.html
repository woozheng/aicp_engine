<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICP · 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1a1d2e;
  color: #e0e0e0;
  display: flex; align-items: center; justify-content: center;
  height: 100vh;
}
.login-card {
  background: #1e2233;
  border-radius: 12px;
  padding: 32px 28px;
  width: 360px;
  text-align: center;
}
.login-card h2 {
  font-size: 1.4rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: #f1f5f9;
}
.login-card .sub {
  font-size: 0.8rem;
  color: #6b7280;
  margin-bottom: 24px;
}
.login-card input {
  width: 100%;
  padding: 12px 16px;
  background: #151821;
  border: 1px solid #2d3148;
  border-radius: 8px;
  color: #f1f5f9;
  font-size: 1rem;
  font-family: 'Consolas', monospace;
  letter-spacing: 0.2em;
  text-align: center;
  outline: none;
  margin-bottom: 16px;
}
.login-card input:focus {
  border-color: #6366f1;
}
.login-card button {
  width: 100%;
  padding: 12px;
  background: #6366f1;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
}
.login-card button:hover { background: #4f46e5; }
.error { color: #f87171; font-size: 0.8rem; margin-top: 10px; display: none; }
</style>
</head>
<body>

<div class="login-card">
  <h2>AICP</h2>
  <div class="sub">输入访问密钥</div>
  <input type="password" id="tokenInput" placeholder="••••••••" autofocus>
  <div class="error" id="errorMsg">密钥无效</div>
  <button onclick="login()">验证</button>
</div>

<script>
function login() {
  var token = document.getElementById('tokenInput').value.trim();
  if (!token) return;

  fetch('/api/auth/verify', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-AICP-Token': token
    }
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok) {
      document.cookie = 'aicp_token=' + token + '; path=/; max-age=2592000';
      var redirect = new URLSearchParams(location.search).get('redirect') || '/';
      window.location.href = redirect;
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  })
  .catch(() => {
    document.getElementById('errorMsg').style.display = 'block';
  });
}

document.getElementById('tokenInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
