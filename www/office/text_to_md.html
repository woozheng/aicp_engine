<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本转Markdown智能转换器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.6rem; font-weight: 600; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .panel { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 16px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .panel-title { font-size: 0.95rem; font-weight: 600; }
        textarea { width: 100%; height: 420px; border: 1px solid #ddd; border-radius: 6px; padding: 12px; font-size: 0.9rem; resize: none; font-family: 'Consolas', 'Monaco', monospace; line-height: 1.6; background: #fafafa; }
        textarea:focus { outline: none; border-color: #6366f1; }
        #output { background: #fff; }
        .btn { padding: 7px 14px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 0.85rem; background: #fff; transition: background 0.15s; }
        .btn:hover { background: #f0f0f0; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #6366f1; color: #fff; border-color: #6366f1; }
        .btn-primary:hover { background: #5558e6; }
        .action-bar { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 16px; }
        .btn-convert { padding: 10px 32px; font-size: 1rem; }
        .loading { display: none; align-items: center; gap: 8px; font-size: 0.85rem; color: #888; }
        .loading.active { display: flex; }
        .spinner { width: 18px; height: 18px; border: 2px solid #e5e5e5; border-top: 2px solid #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { display: none; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 0.85rem; }
        .error-msg.active { display: block; }
        .stats { display: flex; gap: 12px; }
        .stat-item { font-size: 0.8rem; color: #888; }
        .stat-value { color: #6366f1; font-weight: 600; }
        .sample-btn { font-size: 0.8rem; padding: 5px 10px; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>文本转Markdown智能转换器</h1>
        <div class="error-msg" id="errorMsg"></div>
        <div class="action-bar">
            <button class="btn btn-primary btn-convert" id="btnConvert" onclick="convertText()">智能转换</button>
            <div class="loading" id="loading"><div class="spinner"></div><span>处理中...</span></div>
        </div>
        <div class="main-content">
            <div class="panel">
                <div class="panel-header"><span class="panel-title">📝 原始文本</span><button class="btn sample-btn" onclick="loadSample()">加载示例</button></div>
                <textarea id="input" placeholder="在此粘贴您想要转换的文本..."></textarea>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">📄 Markdown输出</span>
                    <div>
                        <button class="btn" onclick="copyMarkdown()">复制</button>
                        <button class="btn" onclick="downloadMarkdown()">下载</button>
                        <button class="btn" onclick="exportToProcessor()">📝 To编辑器</button>
                        <button class="btn" onclick="exportToMindMap()">🧠 To思维导图</button>
                    </div>
                </div>
                <textarea id="output" placeholder="转换后的Markdown将显示在这里，可直接编辑..."></textarea>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header"><span class="panel-title">📊 统计</span></div>
            <div class="stats">
                <div class="stat-item">原始: <span class="stat-value" id="rawLen">0</span> 字符</div>
                <div class="stat-item">转换: <span class="stat-value" id="mdLen">0</span> 字符</div>
                <div class="stat-item">变化: <span class="stat-value" id="ratio">-</span></div>
            </div>
        </div>
    </div>
    <script>
        const project = window.location.pathname.split('/')[1];
        const API_URL = `/api/applications/${project}/text_to_md`;
    
        function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('active'); }
        function setLoading(loading) { const el = document.getElementById('loading'); const btn = document.getElementById('btnConvert'); if (loading) { el.classList.add('active'); btn.disabled = true; btn.textContent = '转换中...'; } else { el.classList.remove('active'); btn.disabled = false; btn.textContent = '智能转换'; } }
    
        async function convertText() {
            const input = document.getElementById('input').value.trim();
            const output = document.getElementById('output');
            document.getElementById('errorMsg').classList.remove('active');
            if (!input) { showError('请输入要转换的文本'); return; }
            setLoading(true); output.value = '';
            try {
                const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'convert_stream', content: input}) });
                const reader = res.body.getReader(); const decoder = new TextDecoder(); let fullText = '';
                while (true) { const {done, value} = await reader.read(); if (done) break; fullText += decoder.decode(value, {stream:true}); output.value = fullText; output.scrollTop = output.scrollHeight; }
                document.getElementById('rawLen').textContent = input.length;
                document.getElementById('mdLen').textContent = fullText.length;
                document.getElementById('ratio').textContent = input.length > 0 ? ((1 - fullText.length / input.length) * 100).toFixed(1) + '%' : '-';
            } catch (err) { showError('转换失败: ' + err.message); } finally { setLoading(false); }
        }
    
        function copyMarkdown() { const text = document.getElementById('output').value; if (!text) { showError('没有可复制的内容'); return; } navigator.clipboard.writeText(text).then(() => alert('已复制!')); }
        function downloadMarkdown() { const text = document.getElementById('output').value; if (!text) { showError('没有可下载的内容'); return; } const blob = new Blob([text], {type:'text/markdown'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'converted_' + Date.now() + '.md'; a.click(); }
        function exportToProcessor() { const text = document.getElementById('output').value; if (!text) { showError('没有可导出的内容'); return; } const p = window.location.pathname.split('/')[1]; window.open(`/${p}/text-processor.html?content=` + encodeURIComponent(text), '_blank'); }
    
        function exportToMindMap() {
            const text = document.getElementById('output').value;
            if (!text) { showError('没有可导出的内容'); return; }
            const tree = mdToTree(text);
            const json = JSON.stringify(tree);
            window.open(`/${project}/aicp-mind.html?import=${encodeURIComponent(json)}`, '_blank');
        }
    
        function mdToTree(md) {
            const lines = md.split('\n');
            const root = { text: 'Root', children: [] };
            const headingStack = [{ node: root, level: 0 }];
            let listStack = [];
            let pendingParagraphs = [];
    
            function resetListStack() { listStack = []; }
            function flushParagraphs() {
                if (pendingParagraphs.length === 0) return;
                const text = pendingParagraphs.join(' ').trim();
                pendingParagraphs = [];
                if (!text || text.length < 5) return;
                const parent = headingStack.length > 0 ? headingStack[headingStack.length - 1].node : root;
                const truncated = text.length > 60 ? text.substring(0, text.lastIndexOf(' ', 60)) + '...' : text;
                parent.children.push({ text: truncated, children: [] });
            }
    
            for (let line of lines) {
                const trimmed = line.trim();
                if (!trimmed) { flushParagraphs(); continue; }
                if (/^(---|\*\*\*|___|>|!\[|\|)/.test(trimmed)) { flushParagraphs(); continue; }
    
                const headingMatch = trimmed.match(/^(#{1,6})\s+(.+)/);
                const listMatch = trimmed.match(/^(\s*)[-*+]\s+(.+)/);
                const numberedMatch = trimmed.match(/^(\s*)\d+[\.\)]\s+(.+)/);
    
                if (headingMatch) {
                    flushParagraphs(); resetListStack();
                    const level = headingMatch[1].length;
                    const text = headingMatch[2].trim();
                    if (!text) continue;
                    const newNode = { text, children: [] };
                    while (headingStack.length > 0 && headingStack[headingStack.length - 1].level >= level) headingStack.pop();
                    if (headingStack.length > 0) headingStack[headingStack.length - 1].node.children.push(newNode);
                    else root.children.push(newNode);
                    headingStack.push({ node: newNode, level });
                    listStack = [{ indent: -1, node: newNode }];
                } else if (listMatch || numberedMatch) {
                    flushParagraphs();
                    if (headingStack.length === 0) continue;
                    const match = listMatch || numberedMatch;
                    const indent = match[1].length;
                    const text = (listMatch ? listMatch[2] : numberedMatch[2]).trim();
                    if (!text || text.length > 80) continue;
                    const leaf = { text, children: [] };
                    while (listStack.length > 0 && listStack[listStack.length - 1].indent >= indent) listStack.pop();
                    if (listStack.length > 0) listStack[listStack.length - 1].node.children.push(leaf);
                    listStack.push({ indent, node: leaf });
                } else {
                    if (trimmed.length > 5) pendingParagraphs.push(trimmed);
                }
            }
            flushParagraphs();
            if (root.children.length === 1) return root.children[0];
            if (root.children.length > 1) return { text: '转换结果', children: root.children };
            return root;
        }
    
        function loadSample() { document.getElementById('input').value = `这是标题一\n\n这是一个段落，里面有一些重要的内容。\n\n要点1: 这是第一个要点\n要点2: 这是第二个要点\n\n下面是一些代码:\nfunction hello() {\n    console.log("Hello World!");\n}\n\n表格数据:\n姓名 年龄 城市\n张三 25 北京\n李四 30 上海`; }
        document.getElementById('input').addEventListener('keydown', function(e) { if (e.ctrlKey && e.key === 'Enter') convertText(); });
    </script>
</body>
</html>
