<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AICP JS Engine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{color:#e94560;margin-bottom:16px;font-size:22px;flex-shrink:0}
.main{display:flex;flex-direction:column;gap:16px;flex-shrink:0;max-width:920px;width:100%}
.input-row{
    display:flex;
    gap:12px;
    width:100%;
    flex-wrap:nowrap;
    overflow-x:auto;
    padding-bottom:4px;
}
#cmdInput{
    flex:1;
    min-width:0;
    padding:16px 20px;
    background:#0f3460;
    color:#e0e0e0;
    border:1px solid #1a1a5e;
    border-radius:10px;
    font-size:16px;
    outline:none;
    min-height:56px;
    max-height:200px;
    resize:vertical;
    overflow-y:auto;
    line-height:1.5;
    font-family:inherit;
}
#cmdInput:focus{border-color:#e94560}
button{
    padding:12px 24px;
    background:#e94560;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:bold;
    white-space:nowrap;
    flex-shrink:0;
}
button:hover{background:#c23850}
button:disabled{opacity:0.5;cursor:not-allowed}
#saveBtn{padding:12px 16px;font-size:18px}
#aicp-output{
    overflow:auto;
    width:calc(100% + 60px);
    max-width:1100px;
    height:calc(100vh - 200px);
    min-width:200px;
    min-height:200px;
    background:#0f3460;
    border-radius:8px;
    position:relative;
    margin-top:16px;
    max-height:none;
}
/* 伪元素拖拽手柄，不在DOM节点内，innerHTML清空完全不影响 */
#aicp-output::after{
    content:"";
    position:absolute;
    bottom:0;
    right:0;
    width:60px;
    height:60px;
    background:linear-gradient(135deg,transparent 60%,rgba(255,255,255,0.25) 60%);
    cursor:nwse-resize;
    border-radius:0 0 8px 0;
    z-index:99;
    pointer-events:auto;
}
.status-text{font-size:12px;color:#a0a0a0;text-align:center;padding:4px 0;flex-shrink:0}
.cfg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:99999;display:flex;align-items:center;justify-content:center}
.cfg-box{background:#1a1a2e;padding:20px;border-radius:10px;width:90%;max-width:400px}
.cfg-box h3{color:#e94560;margin-bottom:16px}
.cfg-box input{width:100%;padding:10px;margin-bottom:10px;background:#0f3460;color:#fff;border:1px solid #1a1a5e;border-radius:6px;font-size:14px}
.cfg-box button{flex:1;padding:10px;border:none;border-radius:6px;font-size:14px;cursor:pointer}

@media(max-width:768px){
    body{padding:8px}
    h1{font-size:18px;margin-bottom:10px}
    .main{gap:10px;max-width:100%}
    #cmdInput{min-height:44px;max-height:120px;font-size:14px;padding:10px 14px}
    button{padding:8px 10px;font-size:11px;border-radius:6px}
    #saveBtn,#settingsBtn{padding:8px 10px;font-size:14px;width:40px}
    #aicp-output{
        width:100%;
        max-width:unset;
        height:calc(100vh - 160px);
        min-width:unset;
        min-height:150px;
    }
    #aicp-output::after{
        width:80px;
        height:80px;
    }
    .status-text{font-size:10px}
}
</style>
</head>
<body>
<h1>🧠 AICP JS Engine</h1>
<div class="main">
    <div class="input-row">
        <textarea id="cmdInput" placeholder="Speak your command..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();run()}"></textarea>
        <button id="runBtn" onclick="run()">Do it</button>
        <button id="saveBtn" onclick="saveHTML()" style="background:#1a1a5e;">💾</button>
        <button id="settingsBtn" onclick="showSettings()" style="background:#1a1a5e;">⚙️</button>
    </div>
</div>
<div id="aicp-output"></div>
<div id="status" class="status-text">引擎就绪 | 拖拽右下角自由调整容器大小 | Shift+Enter 换行</div>

<script type="module">
    import aicp from '/aicp-core/aicp-core.js';
    
    const runBtn = document.getElementById('runBtn');
    const cmdInput = document.getElementById('cmdInput');
    const output = document.getElementById('aicp-output');
    const statusEl = document.getElementById('status');
    
    const CACHE_KEY = 'aicp_demo_version';
    const CURRENT_VERSION = '20260101';
    if (localStorage.getItem(CACHE_KEY) !== CURRENT_VERSION) {
        localStorage.setItem(CACHE_KEY, CURRENT_VERSION);
        location.reload(true);
    }
    
    if (!localStorage.getItem('aicp_config')) {
        const apiKey = prompt('请输入 API Key (DeepSeek/OpenAI 兼容):');
        if (apiKey) {
            const config = { apiKey, baseUrl: 'https://gpt-agent.cc/v1', model: 'doubao-seed-2.0-code', maxIter: 5, temperature: 0.1 };
            localStorage.setItem('aicp_config', JSON.stringify(config));
            aicp.agent.set('apiKey', apiKey);
        }
    }

    // 拖拽逻辑，直接监听output的伪元素区域（点击output右下角触发）
    let isDragging = false;
    let startX, startY, startW, startH;
    function startDrag(x, y) {
        isDragging = true;
        startX = x;
        startY = y;
        startW = output.offsetWidth;
        startH = output.offsetHeight;
        output.style.userSelect = 'none';
    }
    function dragMove(x, y) {
        if (!isDragging) return;
        const dx = x - startX;
        const dy = y - startY;
        output.style.width = `${startW + dx}px`;
        output.style.height = `${startH + dy}px`;
    }
    function endDrag() {
        isDragging = false;
        output.style.userSelect = '';
    }

    // 鼠标按下判断是否点击右下角拖拽区域
    output.addEventListener('mousedown', e => {
        const rect = output.getBoundingClientRect();
        const handleW = window.innerWidth > 768 ? 60 : 80;
        // 判断点击坐标落在右下角手柄区域
        const inHandle = (e.clientX >= rect.right - handleW) && (e.clientY >= rect.bottom - handleW);
        if (inHandle) {
            e.preventDefault();
            startDrag(e.clientX, e.clientY);
        }
    });
    document.addEventListener('mousemove', e => dragMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', endDrag);

    // 手机触摸
    output.addEventListener('touchstart', e => {
        const rect = output.getBoundingClientRect();
        const handleW = window.innerWidth > 768 ? 60 : 80;
        const touch = e.touches[0];
        const inHandle = (touch.clientX >= rect.right - handleW) && (touch.clientY >= rect.bottom - handleW);
        if (inHandle) {
            e.preventDefault();
            startDrag(touch.clientX, touch.clientY);
        }
    });
    document.addEventListener('touchmove', e => {
        if (!isDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        dragMove(touch.clientX, touch.clientY);
    }, { passive: false });
    document.addEventListener('touchend', endDrag);
    document.addEventListener('touchcancel', endDrag);
    
    window.run = async function() {
    const q = cmdInput.value.trim();
    if (!q) return;
    runBtn.disabled = true;
    statusEl.textContent = '⏳ 处理中...';
    const rect = output.getBoundingClientRect();
    // 清空旧代码标记
    output.removeAttribute('data-aicp-code');
    try {
        const result = await aicp.send('runner/exec', {
            messages: [{ role: 'user', content: q }],
            maxIter: aicp.agent.get('maxIter', 5),
            container: output,
            width: Math.floor(rect.width) - 4,
            height: Math.floor(rect.height) - 4,
            onStart: () => {},
            onDone: (d) => { 
                statusEl.textContent = '✅ 完成';
                // 强制写入引擎返回完整执行代码
                if(d && typeof d.code === 'string' && d.code.trim()){
                    output.setAttribute('data-aicp-code', d.code.trim());
                }
                // 额外备份当前DOM字符串到另一个属性兜底
                output.setAttribute('data-dom-snap', output.innerHTML);
            },
            onError: (e) => {
                statusEl.textContent = '❌ ' + e;
                output.innerHTML = `<div style="color:#e94560;padding:20px;">❌ ${e}</div>`;
                output.removeAttribute('data-aicp-code');
                output.removeAttribute('data-dom-snap');
            },
        });
    } catch (e) {
        statusEl.textContent = '❌ ' + e.message;
        output.innerHTML = `<div style="color:#e94560;padding:20px;">❌ ${e.message}</div>`;
        output.removeAttribute('data-aicp-code');
        output.removeAttribute('data-dom-snap');
    }
    runBtn.disabled = false;
    cmdInput.focus();
};

    window.showSettings = function() {
        const saved = localStorage.getItem('aicp_config');
        let config = {};
        try { config = JSON.parse(saved) || {}; } catch(e) {}
        
        const ov = document.createElement('div');
        ov.className = 'cfg-overlay';
        ov.innerHTML = `<div class="cfg-box">
            <h3>⚙️ Config</h3>
            <input id="cfgKey" placeholder="API Key" value="${config.apiKey||''}">
            <input id="cfgUrl" placeholder="Base URL" value="${config.baseUrl||'https://gpt-agent.cc/v1'}">
            <input id="cfgModel" placeholder="Model" value="${config.model||'doubao-seed-2.0-code'}">
            <div style="display:flex;gap:10px;">
                <button style="background:#333;color:#fff" onclick="document.body.removeChild(this.closest('.cfg-overlay'))">Cancel</button>
                <button id="cfgSave" style="background:#e94560;color:#fff">Save</button>
            </div>
        </div>`;
        document.body.appendChild(ov);
        document.getElementById('cfgSave').onclick = () => {
            const c = {
                apiKey: document.getElementById('cfgKey').value.trim(),
                baseUrl: document.getElementById('cfgUrl').value.trim() || 'https://gpt-agent.cc/v1',
                model: document.getElementById('cfgModel').value.trim() || 'doubao-seed-2.0-code',
                maxIter: 5, temperature: 0.1,
            };
            localStorage.setItem('aicp_config', JSON.stringify(c));
            Object.assign(aicp.config, c);
            aicp.agent.set('apiKey', c.apiKey);
            aicp.agent.set('baseUrl', c.baseUrl);
            aicp.agent.set('model', c.model);
            document.body.removeChild(ov);
            statusEl.textContent = '✅ Config saved';
        };
    };

 window.saveHTML = async function() {
    if (!output.children.length) {
        alert('No content to save');
        return;
    }
    const rect = output.getBoundingClientRect();
    const exportW = Math.floor(rect.width) - 4;
    const exportH = Math.floor(rect.height) - 4;

    let code = output.getAttribute('data-aicp-code') || '';
    if (!code.trim()) {
        const domHtml = output.getAttribute('data-dom-snap') || output.innerHTML;
        const safeDom = domHtml
            .replace(/\\/g, '\\\\')
            .replace(/`/g, '\\`')
            .replace(/\$/g, '\\$');
        code = `container.innerHTML = \`${safeDom}\`;`;
    }
    code = code.replace(/c\.appendChild\(canvas\);\s*$/, '');
    const escapedCode = code
        .replace(/\\/g, '\\\\')
        .replace(/`/g, '\\`')
        .replace(/\$/g, '\\$')
        .replace(/\n/g, '\\n');

    const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICP Generated</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;padding:8px}
#aicp-container{position:relative;width:100%;min-height:calc(100vh - 16px)}
#aicp-container > *{position:relative;z-index:1}
#aicp-container > canvas{position:absolute;top:0;left:0;z-index:0}
.config-btn{position:fixed;top:10px;right:10px;z-index:9999;padding:6px 12px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px}
.config-btn:hover{background:#2563eb}
.cfg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:99999;display:flex;align-items:center;justify-content:center}
.cfg-box{background:#1a1a2e;padding:20px;border-radius:10px;width:90%;max-width:400px}
.cfg-box h3{color:#e94560;margin-bottom:16px}
.cfg-box input{width:100%;padding:10px;margin-bottom:10px;background:#0f3460;color:#fff;border:1px solid #1a1a5e;border-radius:6px;font-size:14px}
.cfg-box button{flex:1;padding:10px;border:none;border-radius:6px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div id="aicp-container"></div>
<button class="config-btn" id="openCfgBtn">⚙️ LLM配置</button>
<script>
const aicpCode=\`${escapedCode}\`;
const fixedW = ${exportW};
const fixedH = ${exportH};

function getLLMConfig() {
    try { 
        const saved = JSON.parse(localStorage.getItem("aicp_config")); 
        if (saved && saved.apiKey) return saved; 
    } catch(e) {}
    return { apiKey: "", baseUrl: "https://gpt-agent.cc/v1", model: "doubao-seed-2.0-code", temperature: 0.1 };
}
function saveLLMConfig(c) { 
    localStorage.setItem("aicp_config", JSON.stringify(c)); 
}

function createConfigPanel() {
    const cfg = getLLMConfig();
    const ov = document.createElement("div");
    ov.className = "cfg-overlay";
    ov.innerHTML = '<div class="cfg-box"><h3>⚙️ Config</h3><input id="cfgKey" placeholder="API Key" value="'+cfg.apiKey+'"><input id="cfgUrl" placeholder="Base URL" value="'+cfg.baseUrl+'"><input id="cfgModel" placeholder="Model" value="'+cfg.model+'"><div style="display:flex;gap:10px;"><button id="cancelBtn" style="background:#333;color:#fff">Cancel</button><button id="cfgSave" style="background:#e94560;color:#fff">Save</button></div></div>';
    document.body.appendChild(ov);

    // 取消按钮 直接绑定事件，无内嵌onclick
    ov.querySelector("#cancelBtn").addEventListener("click", () => {
        ov.remove();
    });
    // 保存按钮
    ov.querySelector("#cfgSave").addEventListener("click", () => {
        const c = {
            apiKey: ov.querySelector("#cfgKey").value.trim(),
            baseUrl: ov.querySelector("#cfgUrl").value.trim() || "https://gpt-agent.cc/v1",
            model: ov.querySelector("#cfgModel").value.trim() || "doubao-seed-2.0-code",
            temperature: 0.1
        };
        saveLLMConfig(c);
        ov.remove();
        alert("配置已更新，页面刷新");
        location.reload();
    });
}

window.showLLMConfig = createConfigPanel;
document.getElementById("openCfgBtn").addEventListener("click", createConfigPanel);

document.addEventListener('DOMContentLoaded', function() {
    const needLLM = aicpCode.includes('llm(') || aicpCode.includes('llm ');
    let llm = null;
    if (needLLM) {
        let cfg = getLLMConfig();
        if (!cfg.apiKey) {
            createConfigPanel();
        }
        if (cfg.apiKey) {
            let llmCallCount = 0;
            llm = async function(msgs) {
                if (llmCallCount >= 9999) throw new Error("LLM调用次数超限");
                llmCallCount++;
                try {
                    const resp = await fetch(cfg.baseUrl + "/chat/completions", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + cfg.apiKey
                        },
                        body: JSON.stringify({
                            model: cfg.model,
                            messages: msgs,
                            temperature: cfg.temperature
                        })
                    });
                    if (!resp.ok) {
                        throw new Error("接口异常，状态码：" + resp.status);
                    }
                    const data = await resp.json();
                    if (!data.choices || !data.choices[0]?.message?.content) {
                        throw new Error("模型返回数据为空，请检查密钥/接口地址");
                    }
                    return data.choices[0].message.content;
                } catch (err) {
                    // 捕获所有LLM错误弹窗提示用户
                    alert("LLM调用失败：" + err.message + "\\n请核对API Key、接口地址是否正确");
                    return "";
                }
            };
        }
    }
    if(aicpCode&&aicpCode.trim()){
        const c=document.getElementById("aicp-container");
        const fn=new Function("__aicp_container__","__aicp_width__","__aicp_height__","llm","document","Math","Date","JSON","setTimeout","clearTimeout","setInterval","clearInterval","requestAnimationFrame","cancelAnimationFrame",aicpCode);
        fn(c, fixedW, fixedH, llm, document,Math,Date,JSON,setTimeout,clearTimeout,setInterval,clearInterval,requestAnimationFrame,cancelAnimationFrame);
    }
});
<\/script>
</body>
</html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `aicp-generated-${Date.now()}.html`;
    a.click();
    URL.revokeObjectURL(a.href);
    statusEl.textContent = '✅ Saved as standalone HTML';
};
</script>
</body>
</html>
